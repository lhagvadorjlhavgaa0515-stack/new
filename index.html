<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editable Question</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        #question {
            font-size: 24px;
            border: 1px solid #ccc;
            padding: 10px;
            margin: 20px 0;
            min-height: 50px;
        }
        #answer {
            font-size: 16px;
            border: 1px solid #ccc;
            padding: 10px;
            margin: 20px 0;
            width: 80%;
            max-width: 400px;
        }
        #submitBtn {
            font-size: 16px;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #submitBtn:hover {
            background-color: #45a049;
        }
        .toggle-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #333;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
</head>
<body>
    <div class="toggle-switch">
        <label for="bgToggle">Dark Mode</label>
        <label class="switch">
            <input type="checkbox" id="bgToggle">
            <span class="slider"></span>
        </label>
    </div>
    <h1 id="questionNumber">Question 1</h1>
    <div id="question">what is my birthday?</div>
    <textarea id="answer" placeholder="Write your answer here..." rows="4" cols="50"></textarea>
    <button id="submitBtn">Submit</button>
    <script>
        const questions = [
            "what is my birthday?",
            "why did i make this website?",
            "what is my favorite sport?",
            "what do i what the most from u"
        ];
        const correctAnswers = [
            "5 15",
            "cuz nuymzul said so",
            "u dont have one",
            "a hug"
        ];
        const bonusQuestion = "what homechore i hate the most?";
        const bonusCorrectAnswer = "washing the dishes";
        
        let currentQuestionIndex = 0;
        let isBonusQuestion = false;
        const userAnswers = [];
        const results = [];
        let bonusAnswer = null;
        let bonusCorrect = false;

        // Set initial question
        document.getElementById('questionNumber').textContent = `Question ${currentQuestionIndex + 1}`;
        document.getElementById('question').textContent = questions[currentQuestionIndex];
        if (userAnswers[currentQuestionIndex]) {
            document.getElementById('answer').value = userAnswers[currentQuestionIndex];
        }

        document.getElementById('submitBtn').addEventListener('click', function() {
            const answer = document.getElementById('answer').value.trim().toLowerCase();
            
            if (!isBonusQuestion) {
                userAnswers[currentQuestionIndex] = answer;
                const isCorrect = answer === correctAnswers[currentQuestionIndex].toLowerCase();
                results[currentQuestionIndex] = isCorrect;

                if (currentQuestionIndex < questions.length - 1) {
                    // Go to next question
                    currentQuestionIndex++;
                    document.getElementById('questionNumber').textContent = `Question ${currentQuestionIndex + 1}`;
                    document.getElementById('question').textContent = questions[currentQuestionIndex];
                    document.getElementById('answer').value = userAnswers[currentQuestionIndex] || '';
                } else {
                    // All main questions done
                    let correctCount = results.filter(r => r).length;
                    
                    if (correctCount === questions.length) {
                        // Perfect score! Show bonus question
                        isBonusQuestion = true;
                        document.getElementById('questionNumber').textContent = 'Bonus Question';
                        document.getElementById('question').textContent = bonusQuestion;
                        document.getElementById('answer').value = '';
                        alert('Perfect score! You earned a bonus question!');
                    } else {
                        // Show results
                        let wrongCount = results.length - correctCount;
                        let resultText = `Quiz complete!\nCorrect: ${correctCount}\nWrong: ${wrongCount}\n\nDetails:\n`;
                        questions.forEach((q, i) => {
                            resultText += `${q}\nYour answer: ${userAnswers[i]}\nCorrect: ${correctAnswers[i]}\n${results[i] ? '✓ Right' : '✗ Wrong'}\n\n`;
                        });
                        alert(resultText);
                        // Reset for replay
                        currentQuestionIndex = 0;
                        userAnswers.length = 0;
                        results.length = 0;
                        document.getElementById('questionNumber').textContent = `Question ${currentQuestionIndex + 1}`;
                        document.getElementById('question').textContent = questions[currentQuestionIndex];
                        document.getElementById('answer').value = '';
                    }
                }
            } else {
                // Bonus question answered
                bonusAnswer = answer;
                bonusCorrect = answer === bonusCorrectAnswer;
                let resultText = `Bonus Question Complete!\nYour answer: ${bonusAnswer}\nCorrect answer: ${bonusCorrectAnswer}\n${bonusCorrect ? '✓ You got the bonus question right!' : '✗ Not quite, but great effort!'}`;
                alert(resultText);
                
                // Reset for replay
                isBonusQuestion = false;
                currentQuestionIndex = 0;
                userAnswers.length = 0;
                results.length = 0;
                bonusAnswer = null;
                bonusCorrect = false;
                document.getElementById('questionNumber').textContent = `Question ${currentQuestionIndex + 1}`;
                document.getElementById('question').textContent = questions[currentQuestionIndex];
                document.getElementById('answer').value = '';
            }
        });

        // Background toggle
        const bgToggle = document.getElementById('bgToggle');
        bgToggle.addEventListener('change', function() {
            if (this.checked) {
                document.body.style.backgroundColor = '#000';
                document.body.style.color = '#fff';
                document.getElementById('question').style.borderColor = '#555';
                document.getElementById('question').style.backgroundColor = '#222';
                document.getElementById('answer').style.borderColor = '#555';
                document.getElementById('answer').style.backgroundColor = '#222';
                document.getElementById('answer').style.color = '#fff';
            } else {
                document.body.style.backgroundColor = '#fff';
                document.body.style.color = '#000';
                document.getElementById('question').style.borderColor = '#ccc';
                document.getElementById('question').style.backgroundColor = '#fff';
                document.getElementById('answer').style.borderColor = '#ccc';
                document.getElementById('answer').style.backgroundColor = '#fff';
                document.getElementById('answer').style.color = '#000';
            }
        });
    </script>
</body>
</html>
